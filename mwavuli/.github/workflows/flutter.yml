name: flutter

on:
  push:
    paths: ['lib/**', 'test/**', 'pubspec.yaml', '.github/workflows/flutter.yml']
  pull_request:
    paths: ['lib/**', 'test/**', 'pubspec.yaml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # Generate the android/ scaffold (only lib/ is tracked) then build.
      - run: flutter create . --platforms=android --project-name mwavuli
      - run: flutter build apk --debug
