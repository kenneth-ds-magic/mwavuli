name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: production
    steps:
      # 1) Migrate prod with a PRIVILEGED URL held in secrets.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
        working-directory: api
      - run: npm run migrate
        working-directory: api
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
      # 2) Roll out the new image. Fill in for your platform (ECS / Fly / Cloud Run):
      - name: Deploy image
        run: |
          echo "Deploy ghcr.io/${{ github.repository }}/api:${{ github.sha }}"
          echo "e.g. aws ecs update-service --force-new-deployment ..."
          echo "  or flyctl deploy --image ghcr.io/.../api:${{ github.sha }}"
